<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RF Terminal - Reporte de Anomalía</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>



<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#f7fafc",
              "on-tertiary-fixed-variant": "#773200",
              "secondary-fixed-dim": "#ffb4ab",
              "primary-container": "#1a237e",
              "inverse-primary": "#bdc2ff",
              "secondary-fixed": "#ffdad6",
              "primary": "#000666",
              "surface-container-low": "#f1f4f6",
              "secondary-container": "#e02928",
              "surface-tint": "#4c56af",
              "tertiary": "#321100",
              "surface-container-high": "#e5e9eb",
              "on-primary-container": "#8690ee",
              "outline": "#767683",
              "on-error": "#ffffff",
              "primary-fixed": "#e0e0ff",
              "on-surface-variant": "#454652",
              "on-primary-fixed-variant": "#343d96",
              "on-secondary": "#ffffff",
              "on-surface": "#181c1e",
              "tertiary-container": "#532100",
              "outline-variant": "#c6c5d4",
              "primary-fixed-dim": "#bdc2ff",
              "surface-dim": "#d7dadc",
              "on-background": "#181c1e",
              "inverse-on-surface": "#eef1f3",
              "on-tertiary-container": "#f57009",
              "on-secondary-fixed": "#410002",
              "surface-variant": "#e0e3e5",
              "on-secondary-fixed-variant": "#93000b",
              "on-primary": "#ffffff",
              "error-container": "#ffdad6",
              "surface-container": "#ebeef0",
              "inverse-surface": "#2d3133",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed": "#331200",
              "on-error-container": "#93000a",
              "surface-bright": "#f7fafc",
              "surface": "#f7fafc",
              "tertiary-fixed-dim": "#ffb68f",
              "on-primary-fixed": "#000767",
              "secondary": "#bb0112",
              "on-secondary-container": "#fffbff",
              "surface-container-highest": "#e0e3e5",
              "tertiary-fixed": "#ffdbca",
              "on-tertiary": "#ffffff",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Work Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Work+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        display: ['Work Sans', 'sans-serif']
                    },
                    colors: {
                        surface: '#f7fafc',
                        surface_container_low: '#f1f5f9',
                        surface_container: '#e2e8f0',
                        surface_container_high: '#cbd5e1',
                        surface_container_lowest: '#ffffff',
                        primary: '#000666',
                        primary_container: '#1a237e',
                        secondary: '#bb0112',
                        tertiary_container: '#532100',
                        on_tertiary_container: '#10b981',
                        amber_warn: '#f59e0b',
                        info_blue: '#3b82f6'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f7fafc; color: #1e293b; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Work Sans', sans-serif; tracking: tight; }
        .ghost-border { border: 1px solid rgba(148, 163, 184, 0.15); }
        .glass-topbar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(148, 163, 184, 0.15); }
        .shadow-ambient { box-shadow: 0 10px 24px -6px rgba(30, 41, 59, 0.06); }
        
        :root {
            --card-radius: 24px;
            --glass-filter: url('#liquid-glass');
        }
        .liquid-glass-layer {
            backdrop-filter: var(--glass-filter);
            -webkit-backdrop-filter: blur(20px);
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: var(--card-radius);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>

</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">

    <!-- Filtros SVG ocultos para Liquid Glass -->
    <svg style="width: 0; height: 0; position: absolute;" aria-hidden="true">
      <defs>
        <filter id="liquid-glass">
          <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="BLURRED_BG" />
          <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="NOISE" />
          <feDisplacementMap in="BLURRED_BG" in2="NOISE" scale="20" xChannelSelector="R" yChannelSelector="G" result="REFRACTED" />
          <feSpecularLighting in="NOISE" specularExponent="20" lighting-color="#ffffff" result="SPECULAR">
            <fePointLight x="50" y="50" z="200" />
          </feSpecularLighting>
          <feComposite in="SPECULAR" in2="REFRACTED" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" />
        </filter>
      </defs>
    </svg>

<!-- TopAppBar -->
<header class="bg-slate-50/90 dark:bg-slate-900/90 backdrop-blur-md flex items-center justify-between px-4 h-14 w-full docked full-width top-0 shadow-sm z-40">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-indigo-900 dark:text-indigo-300" data-icon="inventory_2">inventory_2</span>
<h1 class="font-['Work_Sans'] font-bold tracking-tight text-indigo-900 dark:text-indigo-300">RECEIVING: PO-99283</h1>
</div>
<div class="text-lg font-black uppercase text-indigo-900 dark:text-indigo-100">
            RF-ANOM-01
        </div>
</header>
<!-- Main Content Area -->
<main class="flex-grow p-4 pb-32">
<!-- Task Header -->
<div class="mb-6 flex flex-col gap-1">
<h2 class="font-headline font-black text-2xl text-primary leading-tight uppercase">REPORTAR ANOMALÍA</h2>
<div class="flex items-center gap-2 text-on-surface-variant bg-surface-container-low w-fit px-3 py-1 rounded">
<span class="material-symbols-outlined text-sm" data-icon="location_on">location_on</span>
<span class="font-label text-xs font-bold uppercase tracking-wider">Bahía C-07</span>
</div>
</div>
<!-- Form Canvas -->
<div class="space-y-6">
<!-- SSCC Pre-filled (Read-Only High Visibility) -->
<div class="bg-surface-container rounded-lg p-4 flex flex-col gap-1">
<label class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Código SSCC Detectado</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container" data-icon="barcode">barcode</span>
<span class="font-headline font-extrabold text-xl tracking-tighter text-primary">00341234567890123456</span>
</div>
</div>
<!-- Dropdowns Section -->
<div class="grid grid-cols-1 gap-4">
<div class="flex flex-col gap-2">
<label class="font-label text-xs font-bold uppercase tracking-widest px-1">Tipo de anomalía</label>
<select class="h-[52px] w-full bg-surface-container-lowest border-none rounded-lg text-sm font-semibold text-on-surface px-4 shadow-sm appearance-none cursor-pointer">
<option disabled="" selected="" value="">Seleccione tipo...</option>
<option value="1">Embalaje dañado</option>
<option value="2">Frasco/Envase roto</option>
<option value="3">Fuga / Derrame</option>
<option value="4">Pallet inestable</option>
</select>
</div>
<div class="flex flex-col gap-2">
<label class="font-label text-xs font-bold uppercase tracking-widest px-1">Responsabilidad percibida</label>
<select class="h-[52px] w-full bg-surface-container-lowest border-none rounded-lg text-sm font-semibold text-on-surface px-4 shadow-sm appearance-none cursor-pointer">
<option disabled="" selected="" value="">Seleccione origen...</option>
<option value="1">Detectado al recibir</option>
<option value="2">Maniobra interna</option>
<option value="3">Almacenaje previo</option>
<option value="4">Desconocido</option>
</select>
</div>
</div>
<!-- Text Area -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs font-bold uppercase tracking-widest px-1">Comentario del operador</label>
<textarea class="w-full bg-surface-container-lowest border-none rounded-lg text-sm p-4 shadow-sm resize-none" placeholder="Describa el daño observado..." rows="4"></textarea>
</div>
<!-- Photo Actions -->
<div class="grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center gap-2 h-24 bg-surface-container-high text-primary rounded-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<span class="font-label text-[10px] font-black uppercase tracking-widest">TOMAR FOTO</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 h-24 bg-surface-container-high text-primary rounded-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="add_photo_alternate">add_photo_alternate</span>
<span class="font-label text-[10px] font-black uppercase tracking-widest">ADJUNTAR FOTO</span>
</button>
</div>
</div>
</main>
<!-- Sticky Footer Actions -->
<div class="fixed bottom-20 left-0 w-full p-4 bg-surface/80 backdrop-blur-md flex flex-col gap-3">
<button class="w-full h-16 bg-secondary text-on-secondary font-headline font-black text-lg uppercase tracking-wider rounded-lg shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="report" style="font-variation-settings: 'FILL' 1;">report</span>
            ENVIAR REPORTE
        </button>
<button class="w-full h-12 bg-transparent text-on-surface-variant font-label font-bold text-sm uppercase tracking-widest rounded-lg flex items-center justify-center">
            CANCELAR
        </button>
</div>
<!-- BottomNavBar -->
<nav class="bg-indigo-900 dark:bg-slate-950 fixed bottom-0 w-full h-20 z-50 tonal-layering-surface-container-high shadow-[0_-4px_10px_rgba(0,0,0,0.1)] flex justify-around items-center px-2">
<div class="flex flex-col items-center justify-center text-indigo-300/70 py-3 px-2 hover:bg-indigo-800 transition-colors duration-150 active:bg-indigo-600">
<span class="material-symbols-outlined" data-icon="barcode_scanner">barcode_scanner</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Scan</span>
</div>
<div class="flex flex-col items-center justify-center bg-gradient-to-b from-indigo-700 to-indigo-900 text-white rounded-lg mx-1 py-3 px-2">
<span class="material-symbols-outlined" data-icon="assignment" style="font-variation-settings: 'FILL' 1;">assignment</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Tasks</span>
</div>
<div class="flex flex-col items-center justify-center text-indigo-300/70 py-3 px-2 hover:bg-indigo-800 transition-colors duration-150 active:bg-indigo-600">
<span class="material-symbols-outlined" data-icon="shelves">shelves</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Inventory</span>
</div>
<div class="flex flex-col items-center justify-center text-indigo-300/70 py-3 px-2 hover:bg-indigo-800 transition-colors duration-150 active:bg-indigo-600">
<span class="material-symbols-outlined" data-icon="warning">warning</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Alerts</span>
</div>
</nav>
</body></html>
