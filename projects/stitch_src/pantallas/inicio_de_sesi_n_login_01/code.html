<body class="font-body bg-background text-on-background antialiased flex flex-col min-h-screen">

    <!-- Filtros SVG ocultos para Liquid Glass -->
    <svg style="width: 0; height: 0; position: absolute;" aria-hidden="true">
      <defs>
        <filter id="liquid-glass">
          <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="BLURRED_BG" />
          <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="NOISE" />
          <feDisplacementMap in="BLURRED_BG" in2="NOISE" scale="20" xChannelSelector="R" yChannelSelector="G" result="REFRACTED" />
          <feSpecularLighting in="NOISE" specularExponent="20" lighting-color="#ffffff" result="SPECULAR">
            <fePointLight x="50" y="50" z="200" />
          </feSpecularLighting>
          <feComposite in="SPECULAR" in2="REFRACTED" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" />
        </filter>
      </defs>
    </svg>
