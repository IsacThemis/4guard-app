version: '3.8'

services:
  # 1. Base de Datos Relacional (Tests y Data del Sistema)
  mysql:
    image: mysql:8.0
    container_name: titan_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-TitanRoot2026!}
      MYSQL_DATABASE: titan_nexus
      MYSQL_USER: titan_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-TitanRoot2026!}
    ports:
      - "3306:3306"
    networks:
      - nexus_network
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # 2. Memoria Persistente y Caché del Agente (ChronicleKeeper)
  redis:
    image: redis:7-alpine
    container_name: titan_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - nexus_network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

  # 3. Interfaz Gráfica para administrar MySQL fácilmente
  adminer:
    image: adminer:latest
    container_name: titan_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - nexus_network
    depends_on:
      - mysql

# Volúmenes persistentes nombrados
volumes:
  mysql_data:
  redis_data:
  nexus-logs:

# Red aislada tipo Bridge para el clúster
networks:
  nexus_network:
    driver: bridge